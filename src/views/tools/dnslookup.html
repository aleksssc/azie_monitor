<section class="tool-page">

    <h1>DNS Lookup</h1>

    <p>
        Retrieve DNS records for a domain name.
    </p>

    <div class="input-group">

        <label for="dns-target">
            Domain
        </label>

        <input
            type="text"
            id="dns-target"
            placeholder="Example: google.com"
            autocomplete="off"
        >

    </div>

    <button id="run-dnslookup" class="tool-button">

        DNS Lookup

    </button>

    <pre id="dnslookup-output" class="tool-terminal"></pre>

</section>
