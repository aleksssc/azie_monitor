<section class="tool-page">

    <h1>Whois Lookup</h1>

    <p>
        Retrieve registration and ownership information for a domain or IP address.
    </p>

    <div class="input-group">

        <label for="whois-target">
            Domain or IP Address
        </label>

        <input
            type="text"
            id="whois-target"
            placeholder="Example: google.com or 8.8.8.8"
            autocomplete="off"
        >

    </div>

    <button id="run-whois" class="tool-button">

        Whois Lookup

    </button>

    <pre id="whois-output" class="tool-terminal"></pre>

</section>
