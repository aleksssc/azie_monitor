<div class="tool-page">

    <h1>Remote Desktop</h1>

    <p>
        Open a Remote Desktop connection to a Windows computer.
    </p>

    <div class="input-group">

        <label for="rdp-target">
            Host or IP Address
        </label>

        <input
            type="text"
            id="rdp-target"
            placeholder="Example: 192.168.1.10"
            autocomplete="off"
        >

    </div>

    <button id="run-rdp">
        Connect
    </button>

    <pre id="rdp-output"></pre>

</div>
