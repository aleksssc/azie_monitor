<div class="tool-page">

    <h1>Port Scan</h1>

    <p>
        Scan a host and discover open TCP ports.
    </p>

    <div class="input-group">

        <label for="portscan-target">
            Host or IP Address
        </label>

        <input
            type="text"
            id="portscan-target"
            placeholder="Example: 192.168.1.1"
            autocomplete="off"
        >

    </div>

    <div class="port-range">

        <div class="input-group">

            <label for="portscan-start">
                Start Port
            </label>

            <input
                type="number"
                id="portscan-start"
                min="1"
                max="65535"
                value="1"
            >

        </div>

        <div class="input-group">

            <label for="portscan-end">
                End Port
            </label>

            <input
                type="number"
                id="portscan-end"
                min="1"
                max="65535"
                value="1024"
            >

        </div>

    </div>

    <button id="run-portscan">
        Run Port Scan
    </button>

    <pre id="portscan-output"></pre>

</div>
