<section class="tool-page">

    <h1>Traceroute</h1>

    <p>
        Trace the route between your computer and a remote host.
    </p>

    <div class="input-group">

        <label for="traceroute-target">
            Target
        </label>

        <input
            type="text"
            id="traceroute-target"
            placeholder="Enter IP address or hostname..."
            autocomplete="off"
        >

    </div>

    <button id="run-traceroute">

        Run Traceroute

    </button>

    <pre id="traceroute-output"></pre>

</section>
