<div class="server-form">

    <div class="page-header">

        <div>
            <h1 id="edit-group-title">Edit Group</h1>

            <p>
                Select the servers that belong to this group.
            </p>
        </div>

        <button
            id="back-edit-group-btn"
            class="back-btn"
            type="button"
        >
            <i class="fa-solid fa-arrow-left"></i>
            Back
        </button>

    </div>

    <div class="form-card">

        <div class="edit-group-toolbar">

            <div>
                <h3>Available Servers</h3>

                <span id="selected-server-count">
                    0 servers selected
                </span>
            </div>

            <input
                id="edit-group-search"
                type="text"
                placeholder="Search server..."
                autocomplete="off"
            >

        </div>

        <div
            id="edit-group-servers-list"
            class="edit-group-servers-list"
        ></div>

        <div class="form-buttons">

            <button
                id="cancel-edit-group-btn"
                class="secondary-btn"
                type="button"
            >
                Cancel
            </button>

            <button
                id="save-group-servers-btn"
                class="primary-btn"
                type="button"
            >
                <i class="fa-solid fa-floppy-disk"></i>
                Save Changes
            </button>

        </div>

    </div>

</div>
